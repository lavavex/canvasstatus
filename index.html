<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #status {
            font-size: 60px;
            font-weight: bold;
            padding: 40px 60px;
            border-radius: 15px;
            margin: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        .up {
            background: #006400;
            color: #90EE90;
        }
        .down {
            background: #8B0000;
            color: #FF9999;
        }
        .last-check {
            font-size: 16px;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Canvas Status</h1>
    
    <div id="status" class="down">Canvas is DOWN</div>
    
    <div class="last-check" id="lastCheck"></div>

    <script>
        // Check if canvasisup file exists (GitHub Pages / static hosting)
        fetch('canvasisup', { method: 'HEAD', cache: 'no-cache' })
            .then(response => {
                if (response.ok) {
                    document.getElementById('status').textContent = "Canvas is UP";
                    document.getElementById('status').className = "up";
                }
            })
            .catch(() => {}); // File doesn't exist → stays DOWN

        // Show last modified time of the status file if available
        fetch('canvasisup', { method: 'HEAD' })
            .then(r => {
                if (r.ok) {
                    const lm = r.headers.get('Last-Modified');
                    if (lm) document.getElementById('lastCheck').textContent = `Became available: ${lm}`;
                }
            });
    </script>
</body>
</html>
